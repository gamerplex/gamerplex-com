name: E2E

# Runs the Playwright suite on every push + PR to main. A red check here means a
# page won't load or login is broken — the thing we never want shipped.
#
# To make this BLOCK a deploy (not just flag it): in GitHub → Settings → Branches,
# add a branch protection rule on `main` requiring the "e2e" check, and merge via PR;
# or in Vercel → Settings → Git, enable "Only deploy when checks pass".

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E (desktop + mobile)
        run: npx playwright test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
